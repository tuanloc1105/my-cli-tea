name: find-everything CI

on:
  push:
    paths:
      - "find-everything/**"
      - ".gitea/workflows/find-everything.yml"
  pull_request:
    paths:
      - "find-everything/**"
      - ".gitea/workflows/find-everything.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: find-everything
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: false
      - name: Verify modules
        run: go mod verify
      - name: Test
        run: go test ./...
      - name: Test native finder policies
        run: go test ./internal/finder -run "Test(HiddenEntriesAndHiddenBaseAreIncluded|UnixUnreadableDescendantProducesPartialResults|SymlinkPolicy)$" -count=1
      - name: Race test
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: find-everything
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: false
      - name: Verify modules
        run: go mod verify
      - name: Test
        run: go test ./...
      - name: Test native finder policies
        run: go test ./internal/finder -run "Test(HiddenEntriesAndHiddenBaseAreIncluded|DarwinHiddenFlagIsIncluded|UnixUnreadableDescendantProducesPartialResults|SymlinkPolicy)$" -count=1
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...

  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: find-everything
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
          cache: false
      - name: Verify modules
        run: go mod verify
      - name: Test
        run: go test ./...
      - name: Test native finder policies
        run: go test ./internal/finder -run "Test(HiddenEntriesAndHiddenBaseAreIncluded|WindowsHiddenAttributeIsIncluded|SymlinkPolicy)$" -count=1
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
